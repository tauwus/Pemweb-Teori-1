<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
    <title>Fandom Hub</title>
</head>
<body>
    <div id="loader-wrapper" class="fixed-top vh-100 vw-100 d-flex align-items-center" style="z-index: 9999;">
        <div id="progress-bar" class="position-absolute start-0 bg-white"></div>
        <div class="loader-panel panel-top position-absolute top-0 start-0 w-100 h-50"></div>
        <div class="loader-panel panel-bottom position-absolute bottom-0 start-0 w-100 h-50"></div>
    </div>

    <main class="container-xxl py-5 content-wrap">
        <header class="text-center mb-5 index-hero">
            <p class="text-uppercase tracking-wide">Fandom Collection</p>
            <h1 class="outline-stack font-agency" data-text="FANDOM HUB">FANDOM HUB</h1>
            <p class="lead mt-3">Tambah fandom baru, edit, atau hapus dengan cepat.</p>
            <button class="btn btn-outline-light mt-3" type="button" id="toggle-form-btn" aria-expanded="false" aria-controls="fandom-form-collapse">
                Add Another Fandom
            </button>
        </header>

        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div id="fandom-form-collapse" class="collapse">
                    <div class="card fandom-form-card position-sticky" style="top: 1.5rem;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h2 class="h4 mb-0">Fandom Details</h2>
                                <button class="btn btn-sm btn-link" type="button" id="cancel-edit-btn">Cancel</button>
                            </div>
                            <form id="fandom-form">
                                <input type="hidden" id="fandom-id" value="">
                                <div class="mb-3">
                                    <label class="form-label" for="fandom-title-input">Title</label>
                                    <input class="form-control" id="fandom-title-input" type="text" placeholder="Fandom title" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="fandom-description-input">Description</label>
                                    <textarea class="form-control" id="fandom-description-input" rows="3" placeholder="Short description" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="fandom-logo-input">Logo URL</label>
                                    <input class="form-control" id="fandom-logo-input" type="url" placeholder="https://...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="fandom-background-input">Background URL</label>
                                    <input class="form-control" id="fandom-background-input" type="url" placeholder="https://...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="fandom-links-input">YouTube Links (one per line)</label>
                                    <textarea class="form-control" id="fandom-links-input" rows="4" placeholder="https://youtu.be/..." required></textarea>
                                </div>
                                <button class="btn btn-primary w-100" type="submit" id="fandom-submit">Add Another Fandom</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-8">
                <div id="cards-container" class="row row-cols-1 row-cols-lg-2 g-4"></div>
                <div id="empty-state" class="text-center py-5 d-none">
                    <p class="lead mb-0">Belum ada fandom. Tekan tombol di atas untuk menambahkan.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
