<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
    <title>Zutto Mayonaka de Iinoni.</title>
</head>
<body>
  <!-- Main Loading Wrapper -->
  <div id="loader-wrapper" class="fixed-top vh-100 vw-100 d-flex align-items-center" style="z-index: 9999;">
    <!-- The Progress Line (White, 2px high) -->
    <div id="progress-bar" class="position-absolute start-0 bg-white"></div>

    <!-- Top Half -->
    <div class="loader-panel panel-top position-absolute top-0 start-0 w-100 h-50"></div>

    <!-- Bottom Half -->
    <div class="loader-panel panel-bottom position-absolute bottom-0 start-0 w-100 h-50"></div>
  </div>

  <main class="container py-5 content-wrap">
    <h1 class="outline-stack text-center font-agency" data-text="MUSIC">MUSIC</h1>

    <section class="yt-slider-section mt-4" aria-label="YouTube section">
      <div class="row justify-content-center">
        <div class="col-12">
          <div class="yt-slider" aria-label="YouTube video slider">
            <button class="yt-nav yt-nav-prev" type="button" aria-label="Previous video">
              &#8592;
            </button>

            <div class="yt-stage" id="yt-stage"></div>

            <button class="yt-nav yt-nav-next" type="button" aria-label="Next video">
              &#8594;
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>
  
</body>
</html>
